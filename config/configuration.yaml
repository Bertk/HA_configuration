# Loads default set of integrations. Do not remove.
default_config:
zeroconf:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - hacsfiles/lovelace-card-mod/card-mod.js

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
input_select: !include input_select.yaml

# sensor data for 14 days
recorder:
  purge_keep_days: 14

logger:
  default: warning
  logs:
    custom_components.sax_battery.number: debug
    custom_components.sax_battery.soc_manager: info
    custom_components.sax_battery.power_manager: debug
    custom_components.sax_battery.coordinator: info
    #  custom_components.sax_battery: debug
    #  custom_components.sax_battery.switch: debug
    #  custom_components.sax_battery.modbusobject: debug
  #  pymodbus: error
  #  logs:
  #    pyeasee: debug
  #    custom_components.easee: debug
  # default: warning
  # logs:
  #  custom_components.sax_battery: debug
  #  pymodbus: debug

  #      pymodbus.logging:
  #      - "ERROR: request ask for transaction_id=" # sax_battery transaction_id bug
  filters:
    custom_components.solarman.solarman:
      - "Querying .1024 - 1070. failed" # NoSocketAvailableError, Empty
      - "Querying registers .1024 - 1070. failed"
      - "Update of sensor.solarman_pv1_power is taking over 10 seconds"
    bluetooth_auto_recovery.recove:
      - "Could not cycle the Bluetooth adapter hci0"
      - "Could not reset the power state of the Bluetooth adapter hci0"
    habluetooth.scanner:
      - "Successful fall-back to passive scanning mode after active scanning failed"

bluetooth:

logbook:
  exclude:
    entities:
      - sensor.solarman_status_lastupdate

# modbus: !include modbus.yaml
template: !include templates.yaml
sensor: !include sensors.yaml

climate:
  - platform: generic_thermostat
    name: Infrarotheizung Hobbyraum
    heater: switch.hobbyraum_steckdose
    target_sensor: sensor.hobbyraum_temperatur
    min_cycle_duration:
      minutes: 5
    hot_tolerance: 1
    ac_mode: false
    cold_tolerance: 1
    unique_id: hobbyraum_heizung

binary_sensor:
  - platform: tod
    name: Night
    after: sunset
    before: sunrise

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24
  ip_ban_enabled: true
  login_attempts_threshold: 5

notify:
  - name: BERT_DEVICES
    platform: group
    services:
      - service: mobile_app_berts_iphone
      - service: mobile_app_berts_ipad
