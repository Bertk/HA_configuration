- id: '1738834207494'
  alias: Wärmepumpe Heizen/Standby abhängig vom Preis
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.xxx_strompreis
    above: input_number.strompreis_heizung_aus
    id: Strom-teuer
  - trigger: numeric_state
    entity_id:
    - sensor.xxx_strompreis
    below: input_number.strompreis_heizung_aus
    id: Strom-billig
  - trigger: numeric_state
    entity_id:
    - sensor.xxx_strompreis
    below: sensor.strompreis_avg_xxx
    id: Heizen-ein
    enabled: true
  - trigger: numeric_state
    entity_id:
    - sensor.xxx_strompreis
    id: Heizen-aus
    above: sensor.strompreis_avg_xxx
    enabled: true
  - trigger: time_pattern
    id: Every-hour
    hours: '*'
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: select.wh_system_systembetriebsart
      state: sys_operationmode_heating
    - condition: state
      entity_id: select.wh_system_systembetriebsart
      state: sys_operationmode_standby
  actions:
  - if:
    - condition: trigger
      id:
      - Heizen-aus
      - Strom-teuer
    - condition: not
      conditions:
      - condition: state
        state:
        - Warmwasserbetrieb
        entity_id: sensor.wh_system_betriebsanzeige
    then:
    - action: climate.set_hvac_mode
      metadata: {}
      data:
        hvac_mode: 'off'
      target:
        entity_id:
        - climate.bad_heizung
        - climate.buro_heizung
        - climate.flur_heizung
        - climate.gastezimmer_heizung
        - climate.hobbyraum_heizung
        - climate.schlafzimmer_heizung
        - climate.toilette_heizung
      enabled: false
    - action: select.select_option
      metadata: {}
      data:
        option: sys_operationmode_standby
      target:
        entity_id:
        - select.wh_system_systembetriebsart
  - if:
    - condition: and
      conditions:
      - condition: trigger
        id:
        - Strom-billig
        - Heizen-ein
        - Every-hour
      - condition: or
        conditions:
        - condition: and
          conditions:
          - condition: numeric_state
            entity_id: sensor.xxx_strompreis
            below: sensor.strompreis_avg_xxx
          - condition: numeric_state
            entity_id: sensor.strompreis_avg_xxx
            below: input_number.strompreis_heizung_aus
        - condition: numeric_state
          entity_id: sensor.xxx_strompreis
          below: input_number.strompreis_heizung_aus
        - condition: time
          after: '21:00:00'
          enabled: true
        enabled: false
      - condition: numeric_state
        entity_id: sensor.xxx_strompreis
        below: input_number.strompreis_heizung_aus
    then:
    - action: climate.set_hvac_mode
      metadata: {}
      data:
        hvac_mode: auto
      target:
        entity_id:
        - climate.wohnzimmer_heizung
        - climate.bad_heizung
        - climate.buro_heizung
        - climate.flur_heizung
        - climate.gastezimmer_heizung
        - climate.hobbyraum_heizung
        - climate.schlafzimmer_heizung
        - climate.toilette_heizung
      enabled: false
    - action: select.select_option
      metadata: {}
      data:
        option: sys_operationmode_heating
      target:
        entity_id:
        - select.wh_system_systembetriebsart
    - if:
      - condition: state
        entity_id: binary_sensor.bad_fenster_state
        state: 'on'
      then:
      - action: climate.set_hvac_mode
        metadata: {}
        target:
          device_id: df2fd9736612151b12280e017b37bda0
        data:
          hvac_mode: 'off'
      enabled: false
    - if:
      - condition: state
        entity_id: binary_sensor.toilette_fenster_state
        state: 'on'
      then:
      - action: climate.set_hvac_mode
        metadata: {}
        target:
          device_id: a209ed86192fc4cfbc37d23ec5803800
        data:
          hvac_mode: 'off'
      enabled: false
  mode: single
