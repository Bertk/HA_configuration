- id: '1728047559032'
  alias: Sax_a monitor Ladeleistung
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_select.sax_a_leistungsgrenzwert_laden
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: New-charge-limit
  - trigger: sun
    event: sunrise
    offset: 0
    id: Sonnenaufgang
  - trigger: time_pattern
    minutes: /15
    id: Charging-condition
    enabled: false
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Charging-condition
      - condition: time
        after: '12:30:00'
      - condition: numeric_state
        entity_id: sensor.solarman_total_active_power_output
        above: 1.5
        enabled: true
      - condition: numeric_state
        entity_id: sensor.sax_bms_combined_soc
        below: 95
      - condition: or
        conditions:
        - condition: numeric_state
          entity_id: sensor.sax_battery_a_power
          below: 1
        - condition: state
          entity_id: input_select.sax_a_leistungsgrenzwert_laden
          state: '0'
          for:
            hours: 0
            minutes: 0
            seconds: 0
      sequence:
      - action: input_select.select_option
        metadata: {}
        data:
          option: '3500'
        target:
          entity_id: input_select.sax_a_leistungsgrenzwert_laden
    - conditions:
      - condition: trigger
        id:
        - New-charge-limit
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{{states.input_select.sax_a_leistungsgrenzwert_laden.state}}'
        target:
          entity_id: number.sax_bms_max_charge
      - action: system_log.write
        metadata: {}
        data:
          level: info
          logger: homeassistant.components.automation.set_sax_a_ladeleistung
          message: P(Laden) aktualisiert auf {{states.input_select.sax_a_leistungsgrenzwert_laden.state|int}}W
      - action: logbook.log
        metadata: {}
        data:
          name: 'Set Batterie Ladeleistung '
          message: P(Laden) aktualisiert auf {{states.input_select.sax_a_leistungsgrenzwert_laden.state|int}}W
    - conditions:
      - condition: trigger
        id:
        - Sonnenaufgang
      - condition: numeric_state
        entity_id: sensor.sonneneinstrahlung_vorhersage_in_5_stunden
        above: 1500
      - condition: numeric_state
        entity_id: sensor.sax_bms_combined_soc
        above: 95
      sequence:
      - action: input_select.select_option
        metadata: {}
        data:
          option: '0'
        target:
          entity_id: input_select.sax_a_leistungsgrenzwert_laden
      - action: logbook.log
        metadata: {}
        data:
          name: 'Set Batterie Ladeleistung '
          message: P(Laden) aktualisiert auf {{states.input_select.sax_a_leistungsgrenzwert_laden.state|int}}W
  mode: single
- id: '1728049706106'
  alias: Sax_a monitor Entladeleistung
  description: ''
  triggers:
  - entity_id:
    - sensor.sax_bms_combined_soc
    id: SOC_above_50
    above: 80
    for:
      hours: 0
      minutes: 5
      seconds: 0
    enabled: true
    trigger: numeric_state
  - entity_id:
    - sensor.sax_bms_combined_soc
    below: 50
    id: SOC_below_50
    for:
      hours: 0
      minutes: 1
      seconds: 0
    trigger: numeric_state
  - entity_id:
    - sensor.sax_bms_combined_soc
    id: SOC_below_min
    below: number.sax_bms_minimum_soc
    for:
      hours: 0
      minutes: 1
      seconds: 0
    enabled: true
    trigger: numeric_state
  - trigger: state
    entity_id:
    - input_select.sax_a_leistungsgrenzwert_entladen
    for:
      hours: 0
      minutes: 0
      seconds: 5
    id: New-discharge-limit
  - trigger: template
    value_template: '{{states(''sensor.sax_battery_a_power'')|float(0) - states(''input_select.sax_a_leistungsgrenzwert_entladen'')
      |float(0) - float(10) > 0 }}'
    id: Above_Limit
  - trigger: numeric_state
    entity_id:
    - sensor.xxx_strompreis
    id: Preis_Tibber_hoch
    for:
      hours: 0
      minutes: 1
      seconds: 0
    above: input_number.strompreis_speicher_export
  - trigger: numeric_state
    entity_id:
    - sensor.xxx_strompreis
    below: input_number.strompreis_speicher_export
    id: Preis_Tibber_niedrig
    for:
      hours: 0
      minutes: 1
      seconds: 0
  - trigger: time_pattern
    id: entladen_refresh
    minutes: /5
    enabled: true
  - trigger: numeric_state
    entity_id:
    - sensor.xxx_strompreis
    id: Strompreis-No-Export
    below: input_number.strompreis_speicher_export_stop
  - trigger: numeric_state
    entity_id:
    - sensor.xxx_strompreis
    id: Strompreis-uber-Mittelwert
    above: sensor.strompreis_avg_xxx
  - trigger: numeric_state
    entity_id:
    - sensor.xxx_strompreis
    id: Strompreis-unter-Mittelwert
    below: sensor.strompreis_avg_xxx
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Strompreis-No-Export
      sequence:
      - action: select.select_option
        metadata: {}
        data:
          option: '0'
        target:
          entity_id: input_select.sax_a_leistungsgrenzwert_entladen
    - conditions:
      - condition: trigger
        id:
        - entladen_refresh
        - SOC_below_min
      - condition: numeric_state
        entity_id: sensor.sax_bms_combined_soc
        below: number.sax_bms_minimum_soc
      sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.sax_a_leistungsgrenzwert_entladen
        data:
          option: '0'
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - SOC_below_50
          - entladen_refresh
        - condition: numeric_state
          entity_id: sensor.sax_bms_combined_soc
          above: number.sax_bms_minimum_soc
        - condition: numeric_state
          entity_id: sensor.xxx_strompreis
          above: input_number.strompreis_speicher_export
        - condition: template
          value_template: '{{states(''sensor.solarman_total_active_power_output'')
            | float(0) == float(0)}}'
        - condition: numeric_state
          entity_id: sensor.strompreis_avg_xxx
          above: input_number.strompreis_speicher_export_stop
      sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.sax_a_leistungsgrenzwert_entladen
        data:
          option: '250'
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - SOC_above_50
          - entladen_refresh
        - condition: numeric_state
          entity_id: sensor.xxx_strompreis
          above: input_number.strompreis_speicher_export
      sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.sax_a_leistungsgrenzwert_entladen
        data:
          option: '1000'
    - conditions:
      - condition: trigger
        id:
        - New-discharge-limit
        - entladen_refresh
        - Above_Limit
      sequence:
      - action: number.set_value
        metadata: {}
        data:
          value: '{{states.input_select.sax_a_leistungsgrenzwert_entladen.state}}'
        target:
          entity_id: number.sax_bms_max_discharge
      - action: system_log.write
        metadata: {}
        data:
          level: info
          logger: homeassistant.components.automation.sax_a_monitor_soc
          message: P(Entladen) aktualisiert auf {{states.input_select.sax_a_leistungsgrenzwert_entladen.state|int}}W"
      - action: logbook.log
        metadata: {}
        data:
          name: Set Batterie Entladeleistung
          message: P(Entladen) aktualisiert auf {{states.input_select.sax_a_leistungsgrenzwert_entladen.state|int}}W
    - conditions:
      - condition: and
        conditions:
        - condition: numeric_state
          entity_id: sensor.sax_bms_combined_soc
          above: number.sax_bms_minimum_soc
        - condition: trigger
          id:
          - Preis_Tibber_niedrig
        - condition: numeric_state
          entity_id: sensor.xxx_strompreis
          above: input_number.strompreis_speicher_export
        - condition: numeric_state
          entity_id: sensor.xxx_strompreis
          below: sensor.strompreis_avg_xxx
      sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.sax_a_leistungsgrenzwert_entladen
        data:
          option: '250'
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - Preis_Tibber_hoch
        - condition: numeric_state
          entity_id: sensor.sax_bms_combined_soc
          above: number.sax_bms_minimum_soc
      sequence:
      - action: input_select.select_option
        metadata: {}
        data:
          option: '250'
        target:
          entity_id: input_select.sax_a_leistungsgrenzwert_entladen
  trace:
    stored_traces: '100'
  mode: single
